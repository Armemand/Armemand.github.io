<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Armand VTT</title>
  <style>
    /* Reset & Optimisation Apple-style */
    * { 
      box-sizing: border-box; 
      -webkit-font-smoothing: antialiased;
    }
    
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
    }

    /* Cadre de la bannière */
    .banner-frame {
      width: 100%;
      max-width: 450px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 15px;
      overflow: hidden;
      margin-bottom: 20px;
      background: #0a0a0a;
    }

    .banner-frame img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Cadre principal */
    .main-frame {
      width: 100%;
      max-width: 450px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 25px;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(145deg, #111, #000);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    /* Titre avec animation "Shimmer" continue */
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 0 0 10px 0;
      letter-spacing: -0.5px;
      text-align: center;
      background: linear-gradient(
        to right, 
        #555 0%, 
        #fff 50%, 
        #555 100%
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    /* Flèche animée */
    .arrow {
      font-size: 2rem;
      margin-bottom: 15px;
      color: #888;
      animation: bounce 2s infinite;
    }

    @keyframes bounce
