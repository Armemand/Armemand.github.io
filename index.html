<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Armand VTT</title>
  <style>
    * { box-sizing: border-box; }
    
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px;
      min-height: 100vh;
    }

    /* Cadre pour la bannière */
    .banner-frame {
      width: 100%;
      max-width: 500px;
      border: 2px solid #333; /* Le cadre */
      border-radius: 15px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .banner-frame img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Cadre principal (Texte + Flèche + Image) */
    .main-frame {
      width: 100%;
      max-width: 500px;
      border: 2px solid #333; /* Le deuxième cadre */
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #0a0a0a;
    }

    h1 {
      font-size: 1.3rem;
      margin: 0 0 10px 0;
      font-weight: 600;
    }

    .arrow {
      font-size: 1.8rem;
      margin-bottom: 15px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
      40% {transform: translateY(-8px);}
      60% {transform: translateY(-4px);}
    }

    /* Image cliquable carrée */
    .insta-link {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #444;
      display: block;
      -webkit-tap-highlight-color: transparent;
    }

    .insta-link img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .insta-link:active {
      transform: scale(0.98);
      transition: transform 0.1s;
    }
  </style>
</head>
<body>

  <div class="banner-frame">
    <img src="banniere.png" alt="Bannière">
  </div>

  <div class="main-frame">
    <h1>Voir plus de Photos</h1>
    
    <div class="arrow">↓</div>

    <a href="https://instagram.com/armand.fk" class="insta-link">
      <img src="Cul.pdf" alt="Clique ici">
    </a>
  </div>

</body>
</html>
