<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Armand VTT</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
      text-align: center;
      /* Modification pour le fond noir */
      background: #000000; 
      color: white;
    }
    h1 {
      margin-bottom: 10px;
    }
    p {
      /* Texte en gris clair pour mieux lire sur le noir */
      color: #ccc; 
    }
    a.btn-link {
      display: block;
      margin: 14px 0;
      padding: 14px;
      text-decoration: none;
      border: 1px solid #444; /* Bordure plus discrète */
      border-radius: 10px;
      color: white;
      font-weight: bold;
      background: #1a1a1a; /* Fond légèrement gris pour le bouton */
    }
    a.btn-link:hover {
      background: #333;
    }
    .img-container img {
      max-width: 100%;
      border-radius: 12px;
      margin: 20px 0;
      transition: transform 0.3s ease;
    }
    .img-container img:hover {
      transform: scale(1.02); /* Petit effet au survol de l'image */
    }
  </style>
</head>
<body>
  
  <h1>Armand VTT</h1>
  <p>Bienvenue 👋</p>

  <a href="https://instagram.com/armand.fk" class="btn-link">Mon Instagram</a>

  <a href="https://instagram.com/armand.fk" class="img-container">
    <img src="Cul.pdf" alt="Ma photo">
  </a>

</body>
</html>
