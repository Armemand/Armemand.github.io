<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Armand VTT</title>
  <style>
    /* Reset et style de base */
    * { box-sizing: border-box; }
    
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh; /* Hauteur dynamique pour mobile */
      padding: 20px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    /* La flèche animée */
    .arrow {
      font-size: 2rem;
      margin-bottom: 20px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
      40% {transform: translateY(-10px);}
      60% {transform: translateY(-5px);}
    }

    /* Le conteneur carré de l'image */
    .insta-link {
      width: 90vw;      /* Prend 90% de la largeur de l'écran mobile */
      max-width: 400px; /* Mais pas plus de 400px sur tablette/PC */
      aspect-ratio: 1 / 1; /* Force le format carré parfait */
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #333;
      box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05);
      display: block;
      -webkit-tap-highlight-color: transparent; /* Enlève le flash bleu au clic sur mobile */
    }

    .insta-link img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Remplit le carré sans déformer l'image */
      display: block;
      transition: transform 0.3s ease;
    }

    /* Petit effet tactile au clic */
    .insta-link:active img {
      transform: scale(0.96);
    }

    /* Texte discret en bas */
    .footer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #666;
    }
  </style>
</head>
<body>

  <h1>Voir plus de Photos</h1>
  
  <div class="arrow">↓</div>

  <a href="https://instagram.com/armand.fk" class="insta-link">
    <img src="photo.jpg" alt="Clique ici pour mon Instagram">
  </a>

  <div class="footer">Clique sur l'image pour ouvrir Instagram</div>

</body>
</html>
