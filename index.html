<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Armand VTT - Team Bamdada's</title>
  <style>
    /* Reset & Apple Font Stack (San Francisco style) */
    * { 
      box-sizing: border-box; 
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
      gap: 25px; /* Espace entre les cadres */
    }

    /* Styles des cadres (Frames) */
    .frame {
      width: 100%;
      max-width: 450px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 28px;
      overflow: hidden;
      background: linear-gradient(145deg, #0f0f0f, #050505);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    /* Cadre 1 : Bannière */
    .banner-frame img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Contenu interne des cadres (espacement intérieur) */
    .content-frame {
      padding: 35px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Animation Shimmer Apple sur les titres (effet de lumière) */
    .shimmer-text {
      font-weight: 700;
      letter-spacing: -0.8px;
      text-align: center;
      background: linear-gradient(to right, #4d4d4d 0%, #ffffff 50%, #4d4d4d 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3.5s linear infinite;
      margin: 0;
    }

    h1 { font-size: 2rem; margin-bottom: 10px; }
    
    /* Espacement augmenté entre le titre et les boutons de la Team */
    h2 { 
      font-size: 1.5rem; 
      margin-bottom: 40px !important; 
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    /* Flèche animée */
    .arrow {
      font-size: 1.8rem;
      margin-bottom: 15px;
      color: #888;
      animation: bounce 2.5s infinite ease-in-out;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50% { transform: translateY(-10px); opacity: 1; }
    }

    /* Image principale carrée (Cul.pdf) */
    .insta-link-main {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: block;
      transition: transform 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .insta-link-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Boutons de la Team */
    .team-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .team-btn {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px;
      border-radius: 20px;
      text-decoration: none;
      color: white;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .team-btn img {
      width: 55px;
      height: 55px;
      border-radius: 12px;
      object-fit: cover;
      margin-right: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .team-btn span {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.4px;
    }

    /* Effets tactiles mobile */
    .team-btn:active {
      transform: scale(0.97);
      background: rgba(255, 255, 255, 0.1);
    }
    
    .insta-link-main:active {
      transform: scale(0.98);
    }

    .hint {
      margin-top: 15px;
      font-size: 0.75rem;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <div class="frame banner-frame">
    <img src="banniere.png" alt="Bannière Armand VTT">
  </div>

  <div class="frame content-frame">
    <h1 class="shimmer-text">Voir plus de Photos</h1>
    <div class="arrow">↓</div>
    <a href="https://instagram.com/armand.fk" class="insta-link-main">
      <img src="Cul.jpg" alt="Ouvrir Instagram">
    </a>
    <div class="hint">Appuie pour explorer</div>
  </div>

  <div class="frame content-frame">
    <h2 class="shimmer-text">Toute la Team Bamdada's</h2>
    
    <div class="team-container">
      <a href="https://instagram.com/valentin_rtt" class="team-btn">
        <img src="Valou.JPG" alt="Valou">
        <span>Valou</span>
      </a>

      <a href="https://instagram.com/rissebenoit" class="team-btn">
        <img src="Ben.JPG" alt="Benito">
        <span>Benito</span>
      </a>

      <a href="https://instagram.com/nicolas_rmy" class="team-btn">
        <img src="Nico.JPG" alt="Nico">
        <span>Nico</span>
      </a>

      <a href="https://instagram.com/armand.rider" class="team-btn">
        <img src="Armemand.JPG" alt="Armemand">
        <span>Armemand</span>
      </a>
    </div>
  </div>

</body>
</html>
